<main id="content">

                        <nav class="woocommerce-breadcrumb font-size-2">
                            <a routerLink="/" class="h-primary">Home</a>

            </div>
            <div class="container">

                    <!-- Content -->
                    <div class="cbp"
                       data-layout="grid"
                       data-controls="#filterControls"
                       data-animation="quicksand"
                       data-x-gap="20"
                       data-y-gap="100"
                       data-media-queries='[
                        {"width": 1100, "cols": 5},
                        {"width": 800, "cols": 3},
                        {"width": 480, "cols": 1}
                      ]'>
                        <!-- Item -->
                        <div class="cbp-item graphic" *ngFor="let c of categories">
                            <a class="cbp-caption" href="../others/authors-single.html">
                                <img class="rounded-circle img-fluid mb-3" src="{{c.iconImgUrl}}" alt="Image Description" style="width: 180px; height: 180px;">
                                <div class="py-3 text-center">
                                    <h4 class="h6 text-dark">{{c.nameTr}}</h4>
                                    <span class="font-size-2 text-secondary-gray-700">Kitap Sayısı</span>
                                </div>
                            </a>
                        </div>
                        <!-- End Item -->

                    </div>
                    <!-- End Content -->
                </div>
                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-wide border-dark text-dark rounded-0 transition-3d-hover">Load More</button>
